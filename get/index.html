<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download LensReport — Scan Receipts to Excel</title>
  <meta name="description" content="Download LensReport free on iOS and Android. Scan receipts in the field and get real-time reports with working Excel exports.">

  <!-- Open Graph (link preview when shared) -->
  <meta property="og:title" content="Download LensReport">
  <meta property="og:description" content="AI business reporting — scan receipts, get real Excel & PDF reports. Free on iOS & Android.">
  <meta property="og:image" content="https://lensreport.app/assets/images/app-logo-round.png">
  <meta property="og:url" content="https://lensreport.app/get">
  <meta property="og:type" content="website">

  <link rel="icon" href="/assets/images/app-icon.png">

  <!-- Device-aware redirect: runs as early as possible so mobile users skip the landing page. -->
  <script>
    (function () {
      var APP_STORE  = "https://apps.apple.com/us/app/scan-to-excel-ai-lensreport/id6760954658";
      var PLAY_STORE = "https://play.google.com/store/apps/details?id=com.shweth.lensreport";

      var ua = navigator.userAgent || navigator.vendor || window.opera || "";

      // iPadOS 13+ reports as desktop Safari; catch it via touch + Mac platform.
      var isIOS = /iPad|iPhone|iPod/.test(ua) ||
                  (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      var isAndroid = /android/i.test(ua);

      // Allow forcing a store via ?store=ios|android for testing / direct links.
      var forced = (location.search.match(/[?&]store=([^&]+)/) || [])[1];
      if (forced === "ios")      { location.replace(APP_STORE);  return; }
      if (forced === "android")  { location.replace(PLAY_STORE); return; }

      if (isIOS)      { location.replace(APP_STORE);  return; }
      if (isAndroid)  { location.replace(PLAY_STORE); return; }
      // Desktop / unknown: fall through to the landing page with both buttons.
    })();
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background: linear-gradient(160deg, #f4fbf7 0%, #ffffff 60%);
      color: #1a1a1a;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin: 0 auto 24px;
      display: block;
      box-shadow: 0 8px 28px rgba(76, 175, 125, 0.25);
    }
    h1 {
      font-size: 26px;
      line-height: 1.25;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 16px;
      color: #555;
      line-height: 1.55;
      margin-bottom: 32px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 16px 20px;
      border-radius: 14px;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-ios {
      background: #1a1a1a;
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
    }
    .btn-android {
      background: #4CAF7D;
      color: #fff;
      box-shadow: 0 4px 14px rgba(76, 175, 125, 0.35);
    }
    .btn-soon {
      background: #eef0ef;
      color: #9aa0a0;
      box-shadow: none;
      cursor: default;
    }
    .btn-soon:active { transform: none; }
    .btn-soon .soon-tag {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      background: #d8dcda;
      color: #71787a;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .note {
      margin-top: 26px;
      font-size: 13px;
      color: #888;
    }
    .note a { color: #4CAF7D; text-decoration: none; }
    .redirecting {
      margin-top: 22px;
      font-size: 14px;
      color: #999;
      display: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="/assets/images/app-logo-round.png" alt="LensReport logo" class="logo">
    <h1>Get LensReport</h1>
    <p class="sub">AI business reporting — scan receipts and get real Excel &amp; PDF reports in seconds. Free to start, no card needed.</p>

    <div class="buttons">
      <a class="btn btn-ios" href="https://apps.apple.com/us/app/scan-to-excel-ai-lensreport/id6760954658">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M16.365 1.43c0 1.14-.42 2.2-1.13 3-.84.96-2.2 1.7-3.32 1.6-.13-1.1.42-2.27 1.1-3 .8-.86 2.2-1.5 3.35-1.6zM20.5 17.18c-.55 1.27-.82 1.84-1.53 2.96-.99 1.56-2.38 3.5-4.1 3.51-1.53.02-1.92-1-3.99-.99-2.07.01-2.5 1.01-4.03.99-1.72-.02-3.04-1.77-4.03-3.33C-.07 16.67-.36 11.1 1.4 8.16 2.66 6.06 4.65 4.83 6.52 4.83c1.9 0 3.1 1.04 4.67 1.04 1.53 0 2.46-1.04 4.66-1.04 1.66 0 3.42.9 4.68 2.46-4.11 2.25-3.44 8.12.97 9.89z"/></svg>
        Download on the App Store
      </a>
      <div class="btn btn-soon" role="text" aria-label="Google Play — coming soon">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.5,12.92 20.16,13.19L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z"/></svg>
        Google Play
        <span class="soon-tag">Coming soon</span>
      </div>
    </div>

    <p class="redirecting" id="redirecting">Taking you to your app store…</p>

    <p class="note">On a computer? <a href="https://lensreport.app">Visit lensreport.app</a> to learn more.</p>
  </main>

  <noscript>
    <style>.redirecting { display: none !important; }</style>
  </noscript>
</body>
</html>
