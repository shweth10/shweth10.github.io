<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LensReport — Pick a report. Scan. Done.</title>
  <meta name="description" content="Template-first AI that fills your report row by row. Scan receipts, invoices and forms with your phone — export to PDF, Excel with real formulas, or a PIN-locked web link. Collaborate with your field team in real time.">
  <meta name="theme-color" content="#4CAF7D">
  <link rel="canonical" href="https://lensreport.app/">
  <link rel="icon" href="assets/images/app-logo.png" type="image/png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* === RESET === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F7F8FA;
      color: #1A2332;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    :root {
      --green: #4CAF7D;
      --green-light: #5EC98F;
      --green-pale: #E8F5EE;
      --green-dark: #3A9468;
      --coral: #F0856A;
      --purple: #6B5CE7;
      --blue: #0EA5E9;
      --bg: #F7F8FA;
      --bg-white: #FFFFFF;
      --surface: #FFFFFF;
      --card: #FFFFFF;
      --border: #E5E7EB;
      --border-hover: #D1D5DB;
      --text: #1A2332;
      --text-secondary: #6B7280;
      --text-muted: #9CA3AF;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
      --shadow-xl: 0 24px 64px rgba(0,0,0,0.12);
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
    }

    /* === UTILITIES === */
    .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }
    .section { padding: 100px 0; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--green); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
    .section-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(28px, 4vw, 40px); font-weight: 700; letter-spacing: -0.5px; line-height: 1.15; margin-bottom: 12px; color: var(--text); }
    .section-subtitle { font-size: 16px; color: var(--text-secondary); max-width: 560px; line-height: 1.7; }
    .section-header { text-align: center; margin-bottom: 56px; }
    .section-header .section-subtitle { margin: 0 auto; }

    /* === SCROLL REVEAL === */
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .stagger > .reveal:nth-child(1) { transition-delay: 0ms; }
    .stagger > .reveal:nth-child(2) { transition-delay: 80ms; }
    .stagger > .reveal:nth-child(3) { transition-delay: 160ms; }
    .stagger > .reveal:nth-child(4) { transition-delay: 240ms; }
    .stagger > .reveal:nth-child(5) { transition-delay: 320ms; }
    .stagger > .reveal:nth-child(6) { transition-delay: 400ms; }
    .stagger > .reveal:nth-child(7) { transition-delay: 480ms; }
    .stagger > .reveal:nth-child(8) { transition-delay: 560ms; }

    /* === NAV === */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1120px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; color: var(--text); }
    .logo img { width: 36px; height: 36px; border-radius: 10px; box-shadow: var(--shadow-sm); }
    .logo .green { color: var(--green); }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: var(--text); }
    .nav-toggle svg { width: 24px; height: 24px; display: block; }
    .mobile-nav { display: none; position: fixed; top: 64px; left: 0; right: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 16px 24px; z-index: 99; flex-direction: column; gap: 4px; }
    .mobile-nav.open { display: flex; }
    .mobile-nav a { display: block; padding: 12px 16px; font-size: 16px; font-weight: 500; color: var(--text-secondary); border-radius: var(--radius-xs); transition: all 0.2s; }
    .mobile-nav a:hover { background: var(--bg); color: var(--text); }

    /* === FOOTER === */
    footer { border-top: 1px solid var(--border); padding: 40px 0; background: var(--bg); }
    .footer-inner { max-width: 1120px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
    .footer-logo { display: flex; align-items: center; gap: 8px; font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 15px; color: var(--text-secondary); }
    .footer-logo img { width: 24px; height: 24px; border-radius: 6px; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { font-size: 13px; color: var(--text-secondary); transition: color 0.2s; }
    .footer-links a:hover { color: var(--text); }
    .footer-copy { font-size: 12px; color: var(--text-muted); }

    /* === RESPONSIVE BASE === */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-toggle { display: block; }
      .section { padding: 72px 0; }
      .footer-inner { flex-direction: column; gap: 16px; text-align: center; }
      .footer-links { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="/" class="logo">
        <img src="assets/images/app-logo.png" alt="LensReport" width="36" height="36">
        <span class="green">Lens</span>Report
      </a>
      <div class="nav-links">
        <a href="#how-it-works">How It Works</a>
        <a href="#features">Features</a>
        <a href="#collaboration">Teams</a>
        <a href="#templates">Templates</a>
        <a href="/privacy/">Privacy</a>
      </div>
      <button class="nav-toggle" onclick="toggleMobileNav()" aria-label="Toggle navigation menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </nav>
  <div class="mobile-nav" id="mobileNav">
    <a href="#how-it-works" onclick="closeMobileNav()">How It Works</a>
    <a href="#features" onclick="closeMobileNav()">Features</a>
    <a href="#collaboration" onclick="closeMobileNav()">Teams</a>
    <a href="#templates" onclick="closeMobileNav()">Templates</a>
    <a href="/privacy/" onclick="closeMobileNav()">Privacy</a>
  </div>

  <main>
    <!-- Task 4-6: Hero section goes here -->
    <!-- Task 7: Trust strip goes here -->
    <!-- Task 8: How it works goes here -->
    <!-- Tasks 9-14: Feature story sections go here -->
    <!-- Task 15: Persona tiles go here -->
    <!-- Task 16: Templates grid goes here -->
    <!-- Task 17: Trust & control goes here -->
    <!-- Task 18: Pricing tease + CTA go here -->
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="assets/images/app-logo.png" alt="LensReport" width="24" height="24">
        LensReport
      </div>
      <div class="footer-links">
        <a href="/privacy/">Privacy Policy</a>
        <a href="/terms/">Terms of Service</a>
        <a href="mailto:shweth@lensreport.app">Contact</a>
      </div>
      <p class="footer-copy">&copy; 2026 LensReport. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function toggleMobileNav() { document.getElementById('mobileNav').classList.toggle('open'); }
    function closeMobileNav() { document.getElementById('mobileNav').classList.remove('open'); }
    document.addEventListener('click', function(e) {
      var nav = document.getElementById('mobileNav');
      var toggle = document.querySelector('.nav-toggle');
      if (nav.classList.contains('open') && !nav.contains(e.target) && !toggle.contains(e.target)) { closeMobileNav(); }
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const target = document.querySelector(link.getAttribute('href'));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    function handleSubmit(e) {
      e.preventDefault();
      const input = e.target.querySelector('input');
      const btn = e.target.querySelector('button');
      const email = input.value;
      btn.textContent = 'Sending...';
      btn.disabled = true;
      window.location.href = 'mailto:shweth@lensreport.app?subject=Early%20Access%20Request&body=Please%20add%20me%20to%20the%20LensReport%20early%20access%20list.%0A%0AEmail:%20' + encodeURIComponent(email);
      setTimeout(() => {
        btn.textContent = "You're on the list!";
        btn.style.background = '#2E9E5E';
        input.value = '';
      }, 1000);
    }
  </script>
</body>
</html>
