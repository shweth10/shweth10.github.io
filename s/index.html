<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src https://*.execute-api.ap-southeast-2.amazonaws.com; img-src 'self' data:;">
  <title>LensReport — Shared Report</title>
  <meta property="og:title" content="Shared Report — LensReport">
  <meta property="og:description" content="View this report shared via LensReport. Your team scans. Your spreadsheet builds itself.">
  <meta property="og:image" content="https://lensreport.app/og-image.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/viewer.css">
</head>
<body>
  <!-- Top Navigation -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="https://lensreport.app" class="nav-brand">
        <div class="nav-logo"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4-4h-2v4h-1V8h1v3h2v1z" fill="white"/></svg></div>
        <span class="nav-name">LensReport</span>
      </a>
      <a href="https://lensreport.app" class="nav-link">lensreport.app<span class="nav-arrow"> →</span></a>
    </div>
  </nav>

  <div id="app">
    <!-- Loading State -->
    <div id="loadingState" class="state-container">
      <div class="loader-logo">
        <div class="loader-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4-4h-2v4h-1V8h1v3h2v1z" fill="white"/></svg></div>
      </div>
      <p class="loader-text">Loading report...</p>
    </div>

    <!-- Report Content -->
    <div id="reportContent" class="report-content hidden">
      <div class="container">
        <!-- Report Header -->
        <header class="report-header">
          <div class="report-label">Shared Report</div>
          <h1 class="report-title" id="reportName"></h1>
          <div class="report-meta">
            <span id="templateName"></span>
            <span class="meta-dot" id="entryCountDot">·</span>
            <span id="entryCount"></span>
            <span class="meta-dot" id="updatedDot">·</span>
            <span id="lastUpdated"></span>
          </div>
          <div class="report-shared-by" id="sharedBy"></div>
        </header>

        <!-- Report Data -->
        <div id="dataTab"></div>

        <!-- Dashboard (rendered below table when data exists) -->
        <div id="dashboardSection" class="dashboard-section hidden">
          <div class="section-divider"></div>
          <h2 class="section-heading">Report Dashboard</h2>
          <div id="dashboardTab"></div>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="state-container hidden">
      <div class="error-content">
        <div class="error-icon" id="errorIcon"></div>
        <h2 class="error-title" id="errorTitle"></h2>
        <p class="error-message" id="errorMessage"></p>
        <a href="https://lensreport.app" class="cta-pill">Get LensReport →</a>
        <p class="cta-tagline">Scan receipts · AI extracts data · Export-ready reports</p>
      </div>
    </div>
  </div>

  <!-- Footer CTA -->
  <footer class="footer" id="footer">
    <div class="footer-inner">
      <div class="footer-prepared">Prepared with LensReport</div>
      <a href="https://lensreport.app" class="cta-pill">Get LensReport →</a>
      <p class="cta-tagline">Scan receipts · AI extracts data · Export-ready reports</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="/viewer.js"></script>
</body>
</html>
